services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    volumes:
      - ./backend/rules:/app/rules:ro
      - ./backend/knowledge:/app/knowledge:ro
      - ./backend/prompts:/app/prompts:ro

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
